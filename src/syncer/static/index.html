<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syncer | High-Precision Lyrics Alignment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050508;
        --panel-bg: rgba(20, 22, 30, 0.6);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text-main: #f0f0f5;
        --text-muted: #9ba1b0;
        --accent-primary: #00ffd5;
        --accent-secondary: #7000ff;
        --accent-tertiary: #ff007b;
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --surface: rgba(30, 32, 45, 0.7);
        --font-sans: "Inter", sans-serif;
        --font-serif: "Playfair Display", serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: var(--font-sans);
        min-height: 100vh;
        overflow-x: hidden;
        line-height: 1.5;
      }

      /* Animated Background Orbs */
      .bg-orbs {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.4;
        mix-blend-mode: screen;
        animation: float 20s infinite ease-in-out;
      }
      .orb-1 {
        width: 400px;
        height: 400px;
        background: var(--accent-secondary);
        top: -10%;
        left: 10%;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 500px;
        height: 500px;
        background: rgba(0, 255, 213, 0.4);
        bottom: -10%;
        right: -5%;
        animation-delay: -5s;
      }
      .orb-3 {
        width: 300px;
        height: 300px;
        background: rgba(255, 0, 123, 0.3);
        top: 40%;
        left: 40%;
        animation-delay: -10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-30px) scale(1.05);
        }
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 4rem 2rem;
      }

      /* Hero */
      .hero {
        text-align: center;
        margin-bottom: 3rem;
        animation: fade-in-up 0.8s ease-out;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--panel-border);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        color: var(--accent-primary);
      }
      .badge::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-primary);
        box-shadow: 0 0 10px var(--accent-primary);
      }
      .hero h1 {
        font-family: var(--font-serif);
        font-size: 4.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        line-height: 1.1;
        background: linear-gradient(to right, #fff, #a0a5b5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero p {
        color: var(--text-muted);
        font-size: 1.1rem;
        max-width: 650px;
        margin: 0 auto;
      }

      /* Glass Panels */
      .glass-panel {
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 2rem;
        animation: fade-in-up 0.8s ease-out 0.2s both;
        position: relative;
        overflow: hidden;
      }
      .glass-panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
      }

      /* Sync Form */
      .sync-form {
        display: flex;
        gap: 1rem;
        position: relative;
        z-index: 1;
      }
      .sync-input {
        flex: 1;
        padding: 1.2rem 1.5rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        color: #fff;
        font-family: var(--font-sans);
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .sync-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      .sync-input:focus {
        outline: none;
        border-color: rgba(0, 255, 213, 0.5);
        box-shadow:
          0 0 20px rgba(0, 255, 213, 0.15),
          inset 0 2px 5px rgba(0, 0, 0, 0.2);
        background: rgba(0, 0, 0, 0.5);
      }
      .sync-button {
        padding: 0 2.5rem;
        background: linear-gradient(135deg, var(--accent-primary), #00b3ff);
        border: none;
        border-radius: 16px;
        color: #000;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 20px rgba(0, 255, 213, 0.2);
        white-space: nowrap;
      }
      .sync-button::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transform: skewX(-20deg);
        transition: 0.5s;
      }
      .sync-button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(0, 255, 213, 0.3);
      }
      .sync-button:hover:not(:disabled)::after {
        left: 150%;
      }
      .sync-button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        filter: grayscale(50%);
        transform: none;
        box-shadow: none;
      }

      .feedback {
        margin-top: 1.5rem;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid transparent;
        height: 3.5rem;
      }
      .feedback-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-muted);
        flex-shrink: 0;
        transition: all 0.3s ease;
      }
      .feedback.processing {
        border-color: rgba(245, 158, 11, 0.3);
        color: #fcd34d;
        background: rgba(245, 158, 11, 0.05);
      }
      .feedback.processing .feedback-dot {
        background: transparent;
        border: 2px solid var(--warning);
        border-top-color: transparent;
        animation: spin 1s linear infinite;
        width: 16px;
        height: 16px;
      }
      .feedback.success {
        border-color: rgba(16, 185, 129, 0.3);
        color: #6ee7b7;
        background: rgba(16, 185, 129, 0.05);
      }
      .feedback.success .feedback-dot {
        background: var(--success);
        box-shadow: 0 0 15px var(--success);
      }
      .feedback.error {
        border-color: rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.05);
      }
      .feedback.error .feedback-dot {
        background: var(--error);
        box-shadow: 0 0 15px var(--error);
      }

      /* Tracks Panel */
      .tracks-panel {
        position: relative;
        animation: fade-in-up 0.8s ease-out 0.4s both;
        min-height: 400px;
        transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        padding: 0;
        overflow: hidden;
      }
      .tracks-panel-content {
        padding: 2.5rem;
      }

      .view-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .track-list-view,
      .track-detail-view {
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        width: 100%;
      }
      .track-detail-view {
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        pointer-events: none;
        transform: translateX(20px) scale(0.98);
      }
      .tracks-panel.show-detail .track-list-view {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-20px) scale(0.98);
        position: absolute;
      }
      .tracks-panel.show-detail .track-detail-view {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0) scale(1);
        position: relative;
      }

      .tracks-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--panel-border);
      }
      .tracks-head h2 {
        font-family: var(--font-serif);
        font-size: 2.2rem;
        font-weight: 600;
        background: linear-gradient(to right, #fff, var(--accent-primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .track-count {
        color: var(--accent-primary);
        font-size: 0.9rem;
        font-weight: 600;
        background: rgba(0, 255, 213, 0.1);
        padding: 0.4rem 1rem;
        border-radius: 2rem;
        border: 1px solid rgba(0, 255, 213, 0.2);
      }

      .track-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }
      .track-card {
        background: rgba(15, 17, 26, 0.7);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 1.5rem;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .track-card:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: rgba(0, 255, 213, 0.4);
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.4),
          0 0 25px rgba(0, 255, 213, 0.15);
        background: rgba(30, 35, 50, 0.8);
      }
      .track-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--accent-secondary),
          var(--accent-primary)
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      .track-card:hover::before {
        opacity: 1;
      }

      .track-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #fff;
      }
      .track-artist {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        font-family: var(--font-serif);
        font-style: italic;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .meta-item {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .meta-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }
      .meta-val {
        font-size: 0.85rem;
        font-weight: 600;
        color: #ddd;
      }

      .conf-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.25rem 0.6rem;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .conf-good {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .conf-warn {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .conf-bad {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .conf-unknown {
        background: rgba(156, 163, 175, 0.15);
        color: #9ca3af;
        border: 1px solid rgba(156, 163, 175, 0.3);
      }

      .empty-state {
        text-align: center;
        padding: 5rem 2rem;
        border: 1px dashed rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        color: var(--text-muted);
        background: rgba(0, 0, 0, 0.2);
        font-size: 1.1rem;
      }

      /* Track Detail View */
      .detail-head {
        display: flex;
        align-items: flex-start;
        gap: 1.5rem;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--panel-border);
      }
      .btn-back {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--panel-border);
        color: #fff;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1.2rem;
        flex-shrink: 0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .btn-back:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.05) translateX(-2px);
        border-color: var(--accent-primary);
        box-shadow: 0 0 15px rgba(0, 255, 213, 0.2);
        color: var(--accent-primary);
      }
      .detail-title-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .detail-header-title {
        font-family: var(--font-serif);
        font-size: 2.2rem;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
        word-break: break-word;
      }
      .detail-header-artist {
        color: var(--accent-primary);
        font-size: 1.2rem;
        font-weight: 500;
        font-family: var(--font-serif);
        font-style: italic;
      }
      .detail-track-id-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.3rem;
      }
      .detail-track-id {
        font-family: monospace;
        font-size: 0.75rem;
        color: var(--text-muted);
        background: rgba(0, 0, 0, 0.4);
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .detail-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 2rem;
        align-items: start;
      }
      @media (max-width: 950px) {
        .detail-layout {
          grid-template-columns: 1fr;
        }
      }

      /* Left Sidebar: Stats */
      .detail-sidebar {
        background: rgba(10, 12, 18, 0.5);
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        padding: 2rem;
        position: sticky;
        top: 2rem;
        box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.02);
      }
      .stat-circle-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2.5rem;
        position: relative;
      }
      .ring-chart {
        position: relative;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: conic-gradient(
          var(--accent-primary) var(--pct),
          rgba(255, 255, 255, 0.05) 0
        );
        box-shadow: 0 0 30px rgba(0, 255, 213, 0.1);
      }
      .ring-chart::before {
        content: "";
        position: absolute;
        inset: 10px;
        background: #0c0e14;
        border-radius: 50%;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }
      .ring-val {
        position: relative;
        font-size: 2.2rem;
        font-weight: 700;
        z-index: 1;
        font-family: var(--font-serif);
        color: #fff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      }
      .ring-label {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
      }

      .detail-info-list {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 1.2rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .info-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .info-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
      }
      .info-val {
        font-size: 0.95rem;
        font-weight: 600;
        text-align: right;
        color: #eee;
      }

      /* Right Main: Lyrics Timeline */
      .timeline-container {
        background: rgba(10, 12, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 2rem;
        height: 650px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.02);
      }
      .timeline-container::-webkit-scrollbar {
        width: 8px;
      }
      .timeline-container::-webkit-scrollbar-track {
        background: transparent;
      }
      .timeline-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
      }
      .timeline-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .lyrics-row {
        display: flex;
        gap: 2rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        opacity: 0.8;
        transition: all 0.3s;
      }
      .lyrics-row:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }
      .lyrics-row:hover {
        opacity: 1;
        border-bottom-color: rgba(255, 255, 255, 0.1);
      }
      .line-timing {
        width: 90px;
        flex-shrink: 0;
        font-family: tabular-nums, monospace;
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-start;
        gap: 0.4rem;
        margin-top: 0.4rem;
      }
      .time-start {
        color: var(--accent-primary);
        font-weight: 600;
        padding: 0.2rem 0.5rem;
        background: rgba(0, 255, 213, 0.1);
        border-radius: 4px;
      }
      .time-end {
        padding: 0.2rem 0.5rem;
      }

      .words-wrapper {
        flex: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        line-height: 2.2;
      }

      .word-node {
        display: inline-flex;
        position: relative;
        cursor: help;
        padding: 0.3rem 0.6rem;
        border-radius: 8px;
        border: 1px solid transparent;
        font-size: 1.15rem;
        font-weight: 500;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        background: rgba(255, 255, 255, 0.03);
        color: #e2e8f0;
      }
      .word-node:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        z-index: 2;
      }

      .node-good {
        border-bottom: 2px solid var(--success);
      }
      .node-warn {
        border-bottom: 2px solid var(--warning);
        color: #fef3c7;
      }
      .node-bad {
        border-bottom: 2px solid var(--error);
        color: #fee2e2;
      }
      .node-none {
        border-bottom: 2px solid rgba(156, 163, 175, 0.5);
        color: #9ca3af;
      }

      /* Tooltip */
      .word-tooltip {
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%) translateY(-5px);
        background: #0f111a;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 0.6rem 0.8rem;
        font-size: 0.75rem;
        font-family: monospace;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
        z-index: 10;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
      }
      .word-tooltip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 6px;
        border-style: solid;
        border-color: var(--panel-border) transparent transparent transparent;
      }
      .word-node:hover .word-tooltip {
        opacity: 1;
        transform: translateX(-50%) translateY(-12px);
      }
      .tt-time {
        color: var(--text-muted);
      }
      .tt-conf {
        font-weight: 700;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
      }
      .tt-conf.good {
        background: rgba(16, 185, 129, 0.2);
        color: #34d399;
      }
      .tt-conf.warn {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
      }
      .tt-conf.bad {
        background: rgba(239, 68, 68, 0.2);
        color: #f87171;
      }

      /* State Views in Detail */
      .detail-msg {
        padding: 6rem 2rem;
        text-align: center;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        height: 400px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      }
      .detail-msg p {
        font-size: 1.1rem;
      }
      .btn-retry {
        margin-top: 1rem;
        padding: 0.8rem 2rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        cursor: pointer;
        border-radius: 12px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-retry:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #fff;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 3rem;
        }
        .sync-form {
          flex-direction: column;
        }
        .sync-button {
          padding: 1.2rem;
        }
        .meta-grid {
          grid-template-columns: 1fr;
        }
        .lyrics-row {
          flex-direction: column;
          gap: 1rem;
        }
        .line-timing {
          width: 100%;
          flex-direction: row;
          justify-content: flex-start;
          gap: 1rem;
          align-items: center;
          margin-top: 0;
        }
        .glass-panel {
          padding: 1.5rem;
        }
        .tracks-panel-content {
          padding: 1.5rem;
        }
        .detail-head {
          flex-direction: column;
          align-items: flex-start;
          gap: 1rem;
        }
        .detail-track-id-wrap {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <main class="container">
      <header class="hero">
        <div class="badge">AI Lyrics Alignment</div>
        <h1>Syncer Dashboard</h1>
        <p>
          Precision word-level timestamps. Drop a Spotify or YouTube link, or
          type <strong>Artist - Title</strong>. We handle the complex audio
          analysis.
        </p>
      </header>

      <section class="glass-panel" aria-labelledby="sync-heading">
        <form id="sync-form" class="sync-form" novalidate>
          <input
            id="sync-input"
            class="sync-input"
            type="text"
            placeholder="Paste Spotify or YouTube link, or type Artist - Title..."
            autocomplete="off"
            required
          />
          <button id="sync-button" class="sync-button" type="submit">
            Process Track
          </button>
        </form>
        <div
          id="feedback"
          class="feedback"
          role="status"
          aria-live="polite"
          style="display: none"
        >
          <span class="feedback-dot" aria-hidden="true"></span>
          <span id="feedback-text">Ready.</span>
        </div>
      </section>

      <section id="tracks-panel" class="tracks-panel glass-panel">
        <div class="tracks-panel-content">
          <div class="view-container">
            <!-- List View -->
            <div id="track-list-view" class="track-list-view">
              <div class="tracks-head">
                <h2>Processed Library</h2>
                <span id="track-count" class="track-count">0 tracks</span>
              </div>
              <div id="empty-state" class="empty-state">
                No tracks processed yet. Build your library by aligning your
                first song!
              </div>
              <div id="track-list" class="track-grid"></div>
            </div>

            <!-- Detail View -->
            <div id="track-detail-view" class="track-detail-view">
              <div class="detail-head">
                <button
                  id="detail-back-button"
                  class="btn-back"
                  title="Back to library"
                  aria-label="Back"
                >
                  ←
                </button>
                <div class="detail-title-wrap">
                  <div id="detail-header-title" class="detail-header-title">
                    Loading...
                  </div>
                  <div
                    id="detail-header-artist"
                    class="detail-header-artist"
                  ></div>
                </div>
                <div class="detail-track-id-wrap">
                  <div class="meta-label">Track ID</div>
                  <div id="detail-track-id" class="detail-track-id"></div>
                </div>
              </div>
              <div id="detail-content" class="detail-content">
                <!-- Content injected here -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // --- DOM Elements ---
      const syncForm = document.getElementById("sync-form");
      const syncInput = document.getElementById("sync-input");
      const syncButton = document.getElementById("sync-button");
      const feedback = document.getElementById("feedback");
      const feedbackText = document.getElementById("feedback-text");

      const tracksPanel = document.getElementById("tracks-panel");
      const trackListView = document.getElementById("track-list-view");
      const trackList = document.getElementById("track-list");
      const emptyState = document.getElementById("empty-state");
      const trackCount = document.getElementById("track-count");

      const detailView = document.getElementById("track-detail-view");
      const detailBackButton = document.getElementById("detail-back-button");
      const detailHeaderTitle = document.getElementById("detail-header-title");
      const detailHeaderArtist = document.getElementById(
        "detail-header-artist",
      );
      const detailTrackId = document.getElementById("detail-track-id");
      const detailContent = document.getElementById("detail-content");

      // --- State ---
      let processingTicker = null;
      let startedAt = 0;
      let tracksCache = [];
      let activeTrackId = null;
      let activeTrackSummary = null;
      let detailRequestToken = 0;

      // --- Helpers ---
      function setFeedback(state, message) {
        feedback.style.display = "flex";
        feedback.className = `feedback ${state}`;
        feedbackText.textContent = message;
      }

      function startProcessingFeedback() {
        clearInterval(processingTicker);
        startedAt = Date.now();
        setFeedback(
          "processing",
          "Synthesizing audio and computing alignments... (0s)",
        );
        processingTicker = setInterval(() => {
          const seconds = Math.floor((Date.now() - startedAt) / 1000);
          feedbackText.textContent = `Synthesizing audio and computing alignments... (${seconds}s)`;
        }, 1000);
      }

      function stopProcessingFeedback() {
        clearInterval(processingTicker);
      }

      function setBusy(isBusy) {
        syncInput.disabled = isBusy;
        syncButton.disabled = isBusy;
        syncButton.innerHTML = isBusy
          ? `<div style="display:flex;align-items:center;gap:0.5rem;"><div class="spinner" style="width:18px;height:18px;border-width:2px;border-top-color:#fff;"></div>Processing...</div>`
          : "Process Track";
      }

      function formatDuration(seconds) {
        const total = Math.max(0, Math.round(Number(seconds) || 0));
        const m = Math.floor(total / 60);
        const s = String(total % 60).padStart(2, "0");
        return `${m}:${s}`;
      }

      function formatPrecisionTime(seconds) {
        const p = Number(seconds);
        if (Number.isNaN(p)) return "--";
        const total = Math.max(0, p);
        const m = Math.floor(total / 60);
        const s = (total % 60).toFixed(2).padStart(5, "0");
        return `${m}:${s}`;
      }

      function formatDate(value) {
        if (!value) return "Unknown";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "Unknown";
        return d.toLocaleDateString(undefined, {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function normalizeConfidence(val) {
        if (val === null || val === undefined || Number.isNaN(Number(val)))
          return null;
        const r = Number(val);
        return r > 1 ? r / 100 : r;
      }

      function confidenceClass(val) {
        const n = normalizeConfidence(val);
        if (n === null) return "unknown";
        if (n >= 0.8) return "good";
        if (n >= 0.5) return "warn";
        return "bad";
      }

      function getTrackId(track) {
        return track?.track_id
          ? String(track.track_id)
          : track?.id
            ? String(track.id)
            : null;
      }

      function parseInput(val) {
        const v = val.trim();
        if (!v) throw new Error("Input is empty.");
        if (/^(https?:\/\/|spotify:|www\.)/i.test(v)) {
          return { url: /^www\./i.test(v) ? `https://${v}` : v };
        }
        const parts = v.split(/\s+-\s+/);
        if (parts.length >= 2) {
          return {
            artist: parts[0].trim(),
            title: parts.slice(1).join(" - ").trim(),
          };
        }
        throw new Error("Use a URL or Artist - Title format.");
      }

      async function requestJSON(path, options) {
        const res = await fetch(path, options);
        const isJson = (res.headers.get("content-type") || "").includes(
          "application/json",
        );
        const data = isJson ? await res.json() : await res.text();
        if (!res.ok)
          throw new Error(
            isJson ? data.detail || data.message || "Failed" : data,
          );
        return data;
      }

      // --- Render Tracks List ---
      function renderTracks(tracks) {
        trackList.innerHTML = "";
        const list = Array.isArray(tracks) ? [...tracks] : [];
        list.sort(
          (a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0),
        );
        tracksCache = list;

        trackCount.textContent = `${list.length} track${list.length === 1 ? "" : "s"}`;
        emptyState.style.display = list.length === 0 ? "block" : "none";

        if (
          activeTrackId &&
          !list.some((t) => getTrackId(t) === activeTrackId)
        ) {
          closeTrackInspector();
        }

        list.forEach((t) => {
          const id = getTrackId(t);
          const card = document.createElement("div");
          card.className = "track-card";
          if (id) {
            card.dataset.id = id;
            card.setAttribute("role", "button");
            card.tabIndex = 0;
          }

          const title = document.createElement("div");
          title.className = "track-title";
          title.textContent = t.title || "Untitled";

          const artist = document.createElement("div");
          artist.className = "track-artist";
          artist.textContent = t.artist || "Unknown";

          const meta = document.createElement("div");
          meta.className = "meta-grid";

          const conf = normalizeConfidence(t.confidence);
          const confText = conf !== null ? `${Math.round(conf * 100)}%` : "N/A";
          const cClass = confidenceClass(t.confidence);

          meta.innerHTML = `
          <div class="meta-item">
            <span class="meta-label">Confidence</span>
            <span class="conf-badge conf-${cClass}">${confText}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Duration</span>
            <span class="meta-val">${formatDuration(t.duration)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Timing</span>
            <span class="meta-val" style="text-transform:capitalize">${(t.timing_source || "unknown").replace("_", " ")}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Processed</span>
            <span class="meta-val">${formatDate(t.created_at)}</span>
          </div>
        `;

          card.append(title, artist, meta);
          trackList.append(card);
        });
      }

      async function loadTracks() {
        try {
          const data = await requestJSON("/api/tracks");
          renderTracks(data);
        } catch (err) {
          console.error(err);
          renderTracks([]);
        }
      }

      // --- Detail View ---
      function closeTrackInspector() {
        tracksPanel.classList.remove("show-detail");
        activeTrackId = null;
        activeTrackSummary = null;
      }

      function showDetailLoading() {
        detailContent.innerHTML = `
        <div class="detail-msg">
          <div class="spinner"></div>
          <p>Analyzing alignment precision map...</p>
        </div>
      `;
      }

      function showDetailError(msg) {
        detailContent.innerHTML = `
        <div class="detail-msg">
          <div style="font-size: 3rem; margin-bottom: 0.5rem">⚠️</div>
          <p style="color:var(--error); font-weight: 500;">Retrieval failed</p>
          <p>${msg}</p>
          <button class="btn-retry" onclick="openTrackInspector(activeTrackId)">Retry Fetch</button>
        </div>
      `;
      }

      function renderTrackDetail(payload, id) {
        const t = payload?.track || {};
        const lines = payload?.lines || [];
        const conf = normalizeConfidence(payload?.confidence);
        const confPct = conf !== null ? Math.round(conf * 100) : 0;

        detailHeaderTitle.textContent = t.title || "Untitled";
        detailHeaderArtist.textContent = t.artist || "Unknown";
        detailTrackId.textContent = id;

        // Calculate word stats
        let wCount = 0;
        let minConf = Infinity;
        let maxConf = -Infinity;

        lines.forEach((l) => {
          const ww = l.words || [];
          if (ww.length) wCount += ww.length;
          else if (l.text) wCount += l.text.split(" ").length;

          ww.forEach((w) => {
            const c = normalizeConfidence(w.confidence);
            if (c !== null) {
              minConf = Math.min(minConf, c);
              maxConf = Math.max(maxConf, c);
            }
          });
        });

        const minConfText =
          minConf !== Infinity ? Math.round(minConf * 100) + "%" : "N/A";
        const maxConfText =
          maxConf !== -Infinity ? Math.round(maxConf * 100) + "%" : "N/A";

        const layout = document.createElement("div");
        layout.className = "detail-layout";

        // Sidebar
        const sidebar = document.createElement("div");
        sidebar.className = "detail-sidebar";
        sidebar.innerHTML = `
        <div class="stat-circle-wrap">
          <div class="ring-chart" style="--pct: ${confPct}%">
            <span class="ring-val">${conf !== null ? confPct + "%" : "--"}</span>
          </div>
          <span class="ring-label">Overall Accuracy</span>
        </div>
        <div class="detail-info-list">
          <div class="info-row"><span class="info-label">Lines Aligned</span><span class="info-val">${lines.length}</span></div>
          <div class="info-row"><span class="info-label">Words Detected</span><span class="info-val">${wCount}</span></div>
          <div class="info-row"><span class="info-label">Accuracy Spread</span><span class="info-val">${minConfText} - ${maxConfText}</span></div>
          <div class="info-row"><span class="info-label">Timing Engine</span><span class="info-val" style="text-transform:capitalize">${(payload?.timing_source || "").replace("_", " ")}</span></div>
          <div class="info-row"><span class="info-label">Detected Lang</span><span class="info-val" style="text-transform:uppercase">${payload?.detected_language || "UNK"}</span></div>
          <div class="info-row"><span class="info-label">Processing Time</span><span class="info-val">${payload?.processing_time_seconds ? payload.processing_time_seconds.toFixed(1) + "s" : "--"}</span></div>
          <div class="info-row"><span class="info-label">Track Duration</span><span class="info-val">${formatDuration(t.duration)}</span></div>
        </div>
      `;

        // Timeline
        const timeline = document.createElement("div");
        timeline.className = "timeline-container";

        if (lines.length === 0) {
          timeline.innerHTML = `<div class="empty-state">No lyrics timeline data available in cache.</div>`;
        } else {
          lines.forEach((l) => {
            const row = document.createElement("div");
            row.className = "lyrics-row";

            const timing = document.createElement("div");
            timing.className = "line-timing";
            timing.innerHTML = `<span class="time-start">${formatPrecisionTime(l.start)}</span><span class="time-end">${formatPrecisionTime(l.end)}</span>`;

            const wordsWrap = document.createElement("div");
            wordsWrap.className = "words-wrapper";

            const words =
              l.words && l.words.length
                ? l.words
                : l.text
                  ? l.text
                      .split(" ")
                      .map((w) => ({
                        text: w,
                        start: l.start,
                        end: l.end,
                        confidence: null,
                      }))
                  : [];

            if (words.length === 0) {
              wordsWrap.innerHTML = `<span class="word-node node-none">(Empty Line)</span>`;
            } else {
              words.forEach((w) => {
                const node = document.createElement("span");
                const cClass = confidenceClass(w.confidence);
                node.className = `word-node node-${cClass}`;
                node.textContent = w.text;

                const start = w.start !== undefined ? w.start : l.start;
                const end = w.end !== undefined ? w.end : l.end;
                const cVal = normalizeConfidence(w.confidence);

                node.innerHTML += `
                <div class="word-tooltip">
                  <span class="tt-time">${start.toFixed(2)}s – ${end.toFixed(2)}s</span>
                  <span class="tt-conf ${cClass}">Conf: ${cVal !== null ? Math.round(cVal * 100) + "%" : "N/A"}</span>
                </div>
              `;
                wordsWrap.appendChild(node);
              });
            }

            row.appendChild(timing);
            row.appendChild(wordsWrap);
            timeline.appendChild(row);
          });
        }

        layout.appendChild(sidebar);
        layout.appendChild(timeline);

        detailContent.innerHTML = "";
        detailContent.appendChild(layout);
      }

      async function openTrackInspector(id) {
        if (!id) return;
        activeTrackId = String(id);

        const summary = tracksCache.find(
          (t) => getTrackId(t) === activeTrackId,
        );
        detailHeaderTitle.textContent = summary
          ? summary.title
          : "Loading Analysis...";
        detailHeaderArtist.textContent = summary ? summary.artist : "";
        detailTrackId.textContent = activeTrackId;

        tracksPanel.classList.add("show-detail");
        showDetailLoading();

        const token = ++detailRequestToken;
        try {
          const data = await requestJSON(
            `/api/cache/${encodeURIComponent(activeTrackId)}`,
          );
          if (token === detailRequestToken)
            renderTrackDetail(data, activeTrackId);
        } catch (err) {
          if (token === detailRequestToken) showDetailError(err.message);
        }
      }

      // --- Events ---
      syncForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = parseInput(syncInput.value);
          setBusy(true);
          startProcessingFeedback();

          await requestJSON("/api/sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          setFeedback("success", "Synchronization successfully processed.");
          syncInput.value = "";
          await loadTracks();
        } catch (err) {
          setFeedback("error", `Error: ${err.message}`);
        } finally {
          stopProcessingFeedback();
          setBusy(false);
        }
      });

      trackList.addEventListener("click", (e) => {
        const card = e.target.closest(".track-card");
        if (card && trackList.contains(card)) {
          openTrackInspector(card.dataset.id);
        }
      });

      trackList.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          const card = e.target.closest(".track-card");
          if (card) {
            e.preventDefault();
            openTrackInspector(card.dataset.id);
          }
        }
      });

      detailBackButton.addEventListener("click", closeTrackInspector);

      // Init
      loadTracks();
    </script>
  </body>
</html>
